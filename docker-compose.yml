version: '3.8'

services:
  kreen-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kreen-app
    ports:
      - "8001:80"
    environment:
      - APP_URL=http://127.0.0.1:8001
      - DB_PATH=/var/www/html/kreen.db
      - APP_DEBUG=true
      - ENABLE_TELEGRAM=true
      - UPSTREAM_URL=http://127.0.0.1:8080
      - SESSION_TIMEOUT=1800
    volumes:
      - .:/var/www/html
      - ./kreen.db:/var/www/html/kreen.db
      - ./kreen_rw.db:/var/www/html/kreen_rw.db
      - ./uploads:/var/www/html/uploads
      - ./logs:/var/log
      - ./sessions:/tmp/php_sessions
    working_dir: /var/www/html
    networks:
      - kreen-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  kreen-network:
    driver: bridge
